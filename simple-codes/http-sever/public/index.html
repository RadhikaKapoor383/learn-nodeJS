<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express File Server</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 720px;
            margin: 60px auto;
            padding: 0 20px;
            line-height: 1.5;
        }

        h1 {
            color: #630735;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            margin: 12px 0;
            padding: 10px;
            font: inherit;
        }

        button {
            margin: 4px 6px 4px 0;
            padding: 10px 14px;
            cursor: pointer;
        }

        pre {
            background: #f2f2f2;
            padding: 14px;
            white-space: pre-wrap;
            min-height: 80px;
        }
    </style>
</head>
<body>
    <h1>Express File Server</h1>
    <p>This page is served from the <code>public</code> folder.</p>

    <textarea id="content" placeholder="Write text here..."></textarea>

    <div>
        <button onclick="readFile()">Read</button>
        <button onclick="writeFile()">Update</button>
        <button onclick="appendFile()">Add</button>
        <button onclick="deleteFile()">Delete</button>
        <button onclick="readAddLog()">Add Log</button>
        <button onclick="readUpdateLog()">Update Log</button>
    </div>

    <h2>Response</h2>
    <pre id="output">Click a button to test the Express routes.</pre>

    <script>
        const contentBox = document.getElementById('content')
        const outputBox = document.getElementById('output')

        function showResult(result) {
            outputBox.textContent = JSON.stringify(result, null, 2)
        }

        async function readFile() {
            const response = await fetch('/read')
            const result = await response.json()
            showResult(result)
        }

        async function writeFile() {
            const response = await fetch('/write', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: contentBox.value })
            })
            const result = await response.json()
            showResult(result)
        }

        async function appendFile() {
            const response = await fetch('/append', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: contentBox.value })
            })
            const result = await response.json()
            showResult(result)
        }

        async function deleteFile() {
            const selectedText = contentBox.value.slice(
                contentBox.selectionStart,
                contentBox.selectionEnd
            )
            const content = selectedText || contentBox.value

            const response = await fetch('/delete', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            })
            const result = await response.json()
            showResult(result)
        }

        async function readAddLog() {
            const response = await fetch('/logs/add')
            const result = await response.json()
            showResult(result)
        }

        async function readUpdateLog() {
            const response = await fetch('/logs/update')
            const result = await response.json()
            showResult(result)
        }
    </script>
</body>
</html>
